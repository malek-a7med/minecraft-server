# Spigot Configuration — Optimized for 1 GB RAM (Railway Free Plan)
# Paper 1.21.1

config-version: 12

advancements:
  disable-saving: false
  disabled:
  - minecraft:story/disabled

commands:
  log: true
  replace-commands:
  - setblock
  - summon
  - testforblock
  - tellraw
  send-namespaced: true
  silent-commandblock-console: false
  spam-exclusions:
  - /skill

messages:
  restart: Server is restarting, please wait a moment.
  whitelist: You are not whitelisted on this server!
  unknown-command: Unknown command. Type "/help" for help.

players:
  disable-saving: false

settings:
  attribute:
    maxAbsorption:
      max: 2048.0
    maxHealth:
      max: 2048.0
    movementSpeed:
      max: 2048.0
  bungeecord: false
  debug: false
  log-villager-deaths: false
  log-named-deaths: true
  moved-too-quickly-multiplier: 10.25
  moved-wrongly-threshold: 0.0625
  netty-threads: 2               # تقليل الـ Threads لتوفير RAM
  player-shuffle: 0
  restart-on-crash: true
  restart-script: ./start.sh
  sample-count: 12
  save-user-cache-on-stop-only: true
  timeout-time: 60
  user-cache-size: 1000

stats:
  disable-saving: false
  forced-stats: {}

world-settings:
  default:
    # ---- مسافات الـ View ----
    view-distance: 4             # مسافة الرؤية المثلى مع 1 جيجا
    simulation-distance: 4

    # ---- Mob Spawn ----
    mob-spawn-range: 3
    entity-activation-range:
      animals: 16
      monsters: 24
      raiders: 48
      misc: 8
      water: 8
      villagers: 16
      flying-monsters: 32
      wake-up-inactive:
        animals-max-per-tick: 2
        animals-every: 60
        animals-for: 1
        monsters-max-per-tick: 4
        monsters-every: 20
        monsters-for: 1
        villagers-max-per-tick: 1
        villagers-every: 600
        villagers-for: 100
      villagers-work-immunity-after: 100
      villagers-work-immunity-for: 20
      villagers-active-for-panic: true
    entity-tracking-range:
      players: 48
      animals: 32
      monsters: 48
      misc: 24
      display: 128
      other: 64

    # ---- Ticks ----
    ticks-per:
      hopper-transfer: 8
      hopper-check: 1

    # ---- الحيوانات والمخلوقات ----
    max-bulk-chunks: 10
    merge-radius:
      exp: 6.0
      item: 4.0
    item-despawn-rate: 5000        # تقليل وقت إخفاء الـ Items
    arrow-despawn-rate: 300
    trident-despawn-rate: 1200
    nerf-spawner-mobs: false
    max-tnt-per-tick: 10

    # ---- Chunks ----
    chunks-per-region-file: 0
    hunger:
      jump-walk-exhaustion: 0.05
      jump-sprint-exhaustion: 0.2
      combat-exhaustion: 0.1
      regen-exhaustion: 6.0
      swim-multiplier: 0.01
      sprint-multiplier: 0.1
      other-multiplier: 0.0
    lightning-strike-distance-limit: 0
    max-entity-collisions: 4
    growth:
      cactus-modifier: 100
      cane-modifier: 100
      melon-modifier: 100
      mushroom-modifier: 100
      pumpkin-modifier: 100
      sapling-modifier: 100
      beetroot-modifier: 100
      carrot-modifier: 100
      potato-modifier: 100
      wheat-modifier: 100
      netherwart-modifier: 100
      vine-modifier: 100
      cocoa-modifier: 100
      bamboo-modifier: 100
      sweetberry-modifier: 100
      kelp-modifier: 100
      twistingvines-modifier: 100
      weepingvines-modifier: 100
      cavevines-modifier: 100
      glowberry-modifier: 100
      pitcherplant-modifier: 100
    verbose: false
