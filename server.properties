#Minecraft server properties — Optimized for Railway Free Plan (1 GB RAM)
#Paper 1.21.1

#---------- Network ----------
server-port=25565
online-mode=false
enforce-secure-profile=false
network-compression-threshold=256

#---------- Performance ----------
view-distance=4
simulation-distance=4
max-tick-time=60000
max-players=20

#---------- Spawn & World ----------
spawn-protection=16
allow-flight=false
level-type=minecraft\:normal
generate-structures=true
level-seed=

#---------- Gameplay ----------
gamemode=survival
difficulty=normal
pvp=true
allow-nether=true
enable-command-block=false
max-world-size=10000

#---------- Misc ----------
motd=\u00A76\u00A7lMinecraft Server \u00A77| Paper 1.21.1
enable-query=false
enable-rcon=false
prevent-proxy-connections=false
sync-chunk-writes=true
