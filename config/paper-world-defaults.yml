# Paper World Defaults — Optimized for 1 GB RAM (Railway Free Plan)
# Paper 1.21.1

_version: 29

anticheat:
  anti-xray:
    enabled: false          # تعطيل X-Ray لتوفير CPU (شغّله لو السيرفر PvP)
    engine-mode: 1
    hidden-blocks:
    - copper_ore
    - deepslate_copper_ore
    - raw_copper_block
    - gold_ore
    - deepslate_gold_ore
    - iron_ore
    - deepslate_iron_ore
    - coal_ore
    - deepslate_coal_ore
    - lapis_ore
    - deepslate_lapis_ore
    - mossy_cobblestone
    - obsidian
    - chest
    - diamond_ore
    - deepslate_diamond_ore
    - redstone_ore
    - deepslate_redstone_ore
    - clay
    - emerald_ore
    - deepslate_emerald_ore
    - ender_chest

chunks:
  auto-save-interval: -1          # يعتمد على player-auto-save في paper-global
  delay-chunk-unloads-by: 10s
  entity-per-chunk-save-limit:
    arrow: 16
    ender_pearl: 8
    experience_orb: 16
    fireball: 8
    small_fireball: 8
    snowball: 8
  fixed-chunk-inhabited-time: -1
  max-auto-save-chunks-per-tick: 8
  prevent-moving-into-unloaded-chunks: true

collisions:
  allow-vehicle-collisions: false
  fix-climbing-bypassing-cramming-rule: true
  max-entity-collisions: 4         # تقليل تصادمات الكيانات
  only-players-collide: false

entities:
  armor-stands:
    do-collision-entity-lookups: false
    tick: false                     # وقف تيك الـ Armor Stands = توفير كبير
  behavior:
    baby-zombie-movement-modifier: 0.5
    disable-chest-cat-detection: true
    disable-creeper-lingering-effect: false
    disable-player-crits: false
    door-breaking-difficulty:
      husk: [HARD]
      vindicator: [NORMAL, HARD]
      zombie: [HARD]
      zombie_villager: [HARD]
      zombified_piglin: [HARD]
    ender-dragons-death-always-places-egg: false
    experience-merge-max-value: 3
    mobs-can-always-pick-up-loot:
      skeletons: false
      zombies: false
    nerf-pigmen-from-nether-portals: false
    parrot-natural-death: false
    phantoms-do-not-spawn-on-creative-players: true
    phantoms-only-attack-insomniacs: true
    piglins-guard-chests: true
    pillager-patrols:
      disable: false
      spawn-chance: 0.1
      spawn-delay:
        per-player: false
        ticks: 12000
      start:
        day: 5
        per-player: false
    should-remove-dragon: false
    spawner-nerfed-mobs-should-jump: false
    zombie-villager-infection-chance: -1.0
    zombies-target-turtle-eggs: true
  despawn-ranges:
    ambient:
      hard: 128
      soft: 32
    axolotls:
      hard: 128
      soft: 32
    creature:
      hard: 128
      soft: 32
    misc:
      hard: 128
      soft: 32
    monster:
      hard: 96            # تقليل النطاق من 128 لتوفير عمليات الحساب
      soft: 32
    underground_water_creature:
      hard: 96
      soft: 32
    water_ambient:
      hard: 64
      soft: 32
    water_creature:
      hard: 96
      soft: 32
  entities-target-with-follow-range: false
  mob-effects:
    spore-blossom-particle-multiplier: 0.125
  tracking-range-y:
    enabled: false

environment:
  disable-explosion-knockback: false
  disable-ice-and-snow: false
  disable-teleportation-suffocation-check: false
  disable-thunder: false
  frosted-ice:
    delay:
      max: 40
      min: 20
    enabled: true
  generate-flat-bedrock: false
  nether-ceiling-void-damage-height: 0
  optimize-explosions: true          # تحسين الانفجارات بدل الحساب الكامل
  portal-create-radius: 16
  portal-search-radius: 128
  portal-search-vanilla-dimension-scaling: true
  treasure-maps:
    enabled: true
    find-already-discovered:
      loot-tables: default
      villager-trade: false
  water-over-lava-flow-speed: 5

feature-seeds:
  generate-random-seeds-for-all: false

loot-tables:
  reroll-identical-loot-until-unique: false   # تعطيل لتوفير CPU

maps:
  item-frame-cursor-limit: 128
  item-frame-cursor-update-interval: 10

misc:
  disable-end-credits: false
  disable-relative-projectile-velocity: false
  disable-sprint-interruption-on-attack: false
  light-queue-size: 20
  max-leash-distance: 10.0
  redstone-implementation: ALTERNATE_CURRENT  # أسرع تطبيق للريدستون
  shield-blocking-delay: 5
  show-sign-click-command-failure-msgs-to-player: false
  update-pathfinding-on-block-update: true

scoreboards:
  allow-non-player-entities-on-scoreboards: false
  use-vanilla-world-scoreboard-name-coloring: false

spawn:
  allow-using-signs-inside-spawn-protection: false
  keep-spawn-loaded: true
  keep-spawn-loaded-range: 2        # تحميل 2 Chunks حول نقطة البداية فقط

tick-rates:
  behavior:
    villager:
      validatenearbypoi: -1
      acquirepoi: -1
  container-update: 1
  grass-spread: 4
  mob-spawner: 1
  sensor:
    villager:
      secondarypoisensor: 40
      nearestbedsensor: 20
      villagerbabiessensor: 40
      playersensor: 20
      nearestlivingentitysensor: 40

world-settings:
  entity-tracking-range:
    display: 128
    experience_orbs: 16
    other: 64
    players: 48
    animals: 32
    monsters: 48

hopper:
  cooldown-when-full: true
  disable-move-event: false
  ignore-occluding-blocks: true
